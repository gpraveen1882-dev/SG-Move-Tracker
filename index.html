<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Singapore Move 2025</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }
  .header { background: #161822; padding: 16px 20px 0; border-bottom: 1px solid #2a2d3a; position: sticky; top: 0; z-index: 10; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .header h1 { font-size: 16px; font-weight: 600; color: #ffffff; letter-spacing: 0.3px; }
  .progress-bar-wrap { height: 3px; background: #2a2d3a; border-radius: 2px; margin-bottom: 12px; }
  .progress-bar { height: 3px; background: #4f8ef7; border-radius: 2px; transition: width 0.4s ease; }
  .tabs { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 9px 14px; font-size: 12px; font-weight: 500; border: none; background: transparent; color: #888; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; font-family: inherit; }
  .tab.active { color: #ffffff; border-bottom-color: #4f8ef7; background: rgba(79,142,247,0.07); }
  .tab:hover:not(.active) { color: #cccccc; background: rgba(255,255,255,0.04); }
  .tab-count { font-size: 10px; font-weight: 400; color: #555; margin-left: 5px; }
  .tab.active .tab-count { color: #4f8ef7; }
  .content { padding: 16px 20px; max-width: 800px; margin: 0 auto; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .stat { background: #1c1f2e; border-radius: 8px; padding: 10px 14px; }
  .stat-label { font-size: 11px; color: #666; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-val { font-size: 22px; font-weight: 600; color: #ffffff; }
  .stat-val span { font-size: 12px; color: #555; font-weight: 400; }
  .add-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .add-input { flex: 1; background: #1c1f2e; border: 1px solid #2a2d3a; border-radius: 8px; padding: 9px 13px; font-size: 13px; color: #e0e0e0; outline: none; font-family: inherit; transition: border-color 0.15s; }
  .add-input::placeholder { color: #444; }
  .add-input:focus { border-color: #4f8ef7; }
  .who-select { background: #1c1f2e; border: 1px solid #2a2d3a; border-radius: 8px; padding: 9px 10px; font-size: 12px; color: #cccccc; outline: none; cursor: pointer; font-family: inherit; }
  .add-btn { background: #4f8ef7; border: none; border-radius: 8px; padding: 9px 16px; color: #fff; font-size: 13px; cursor: pointer; font-weight: 600; white-space: nowrap; font-family: inherit; transition: background 0.15s; }
  .add-btn:hover { background: #3a7ae0; }
  .tasks { display: flex; flex-direction: column; gap: 6px; }
  .task { display: flex; align-items: center; gap: 10px; background: #1c1f2e; border-radius: 8px; padding: 10px 13px; border: 1px solid #22253a; transition: border-color 0.15s; }
  .task:hover { border-color: #3a3d55; }
  .task.done { opacity: 0.38; }
  .task.done .task-text { text-decoration: line-through; color: #555; }
  .cb { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid #3a3d55; background: transparent; cursor: pointer; appearance: none; -webkit-appearance: none; flex-shrink: 0; transition: all 0.15s; position: relative; }
  .cb:checked { background: #4f8ef7; border-color: #4f8ef7; }
  .cb:checked::after { content: '✓'; color: #fff; font-size: 11px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); line-height: 1; }
  .task-text { flex: 1; font-size: 13px; color: #dddddd; line-height: 1.4; }
  .who-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; flex-shrink: 0; letter-spacing: 0.2px; }
  .who-P { background: #1a2a4a; color: #6aa8ff; }
  .who-G { background: #1a3a2a; color: #5ecf8a; }
  .who-both { background: #2e2a14; color: #d4a84c; }
  .del-btn { background: none; border: none; color: #3a3a4a; cursor: pointer; font-size: 18px; padding: 0 3px; line-height: 1; transition: color 0.1s; font-family: inherit; }
  .del-btn:hover { color: #e24b4a; }
  .empty { text-align: center; padding: 40px; color: #444; font-size: 13px; }
  .section-title { font-size: 14px; font-weight: 600; color: #ffffff; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid #2a2d3a; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>Singapore Move 2025</h1>
    <span id="global-pct" style="font-size:12px;color:#4f8ef7;font-weight:600;"></span>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="global-bar" style="width:0%"></div></div>
  <div class="tabs" id="tabs"></div>
</div>

<div class="content" id="content"></div>

<script>
const STORAGE_KEY = 'sg_move_tracker_v3';

const VERTICALS = [
  { id:'dogs', label:'Dogs', tasks:[
    {t:'Microchip registration',w:'P'},
    {t:'Rabies vaccine (full name on cert)',w:'P'},
    {t:'DHLPP vaccine',w:'P'},
    {t:'DHLPP booster',w:'P'},
    {t:'6 months proof of rabies titre',w:'P'},
    {t:'FAV / RNATT report',w:'P'},
    {t:'GST relief application',w:'P'},
    {t:'Pet import license (AVS)',w:'P'},
    {t:'Internal & external parasite treatment (2-7 days before)',w:'P'},
    {t:'AVS certificate',w:'P'},
    {t:'Buy pet crate (airline approved)',w:'both'},
    {t:'Pack food for travel',w:'both'},
    {t:'Pack few mats for crate',w:'both'},
    {t:'Book pet as cargo / cabin',w:'P'}
  ]},
  { id:'school', label:'School', tasks:[
    {t:'Follow up UWC SEA application',w:'both'},
    {t:'SJI application — deadline 4 May',w:'both'},
    {t:'Invictus — check status',w:'both'},
    {t:'Stamford American — check status',w:'both'},
    {t:'Request TC (transfer cert) from Stonegate',w:'G'},
    {t:'Send transcripts / report cards to schools',w:'G'},
    {t:'Apply for student pass (Pia)',w:'P'},
    {t:'Confirm uniform & booklist once school confirmed',w:'both'},
    {t:'Arrange school orientation visit',w:'both'}
  ]},
  { id:'freight', label:'Freight', tasks:[
    {t:'Research & shortlist freight forwarding agents',w:'P'},
    {t:'Get 3 quotes from agents',w:'P'},
    {t:'Pay agent deposit',w:'P'},
    {t:'Decide what to ship vs sell vs throw',w:'both'},
    {t:'Pack and label all boxes',w:'both'},
    {t:'Book collection date with agent',w:'P'},
    {t:'Confirm Singapore delivery address & date',w:'P'},
    {t:'Track shipment',w:'P'}
  ]},
  { id:'selling', label:'Selling stuff', tasks:[
    {t:'Sell nutribullet',w:'G'},
    {t:'Sell oven',w:'G'},
    {t:'Sell vacuum cleaner',w:'G'},
    {t:'Sell mixie',w:'G'},
    {t:'Sell TV',w:'G'},
    {t:'Sell dining table + chairs',w:'G'},
    {t:'Sell bunk bed',w:'G'},
    {t:'Sell mattresses',w:'G'},
    {t:'Sell coffee table',w:'G'},
    {t:'Sell foldable chairs',w:'G'},
    {t:'Sell lights',w:'G'},
    {t:'Sell dog playpen',w:'G'},
    {t:'Sell temp blankets',w:'G'},
    {t:'Post items on Facebook Marketplace / OfferUp',w:'G'}
  ]},
  { id:'cars', label:'Selling cars', tasks:[
    {t:'Get car valuations (CarMax, Carvana, dealer)',w:'P'},
    {t:'Cancel car insurance',w:'P'},
    {t:'Sort road tax / DMV paperwork',w:'P'},
    {t:'Return call re: car sale',w:'P'},
    {t:'Close car loan',w:'P'},
    {t:'Transfer title to buyer',w:'P'}
  ]},
  { id:'ushouse', label:'US house', tasks:[
    {t:'Email rental cancellation form to landlord',w:'P'},
    {t:'Collect security deposit back',w:'P'},
    {t:'Cancel house insurance',w:'P'},
    {t:'Cancel electricity',w:'P'},
    {t:'Cancel gas',w:'P'},
    {t:'Cancel mobile phones',w:'both'},
    {t:'Cancel internet',w:'P'},
    {t:'Cancel subscriptions (watch, streaming etc.)',w:'both'},
    {t:'Cancel credit cards',w:'P'},
    {t:'Cancel US bank accounts',w:'P'},
    {t:'Cancel other insurance policies',w:'P'},
    {t:'Sort 401K rollover / transfer',w:'P'},
    {t:'Sort ALLERUS account',w:'P'},
    {t:'Return items to Costco',w:'G'},
    {t:'Return items to Amazon',w:'G'},
    {t:'Set up US mail forwarding',w:'P'},
    {t:'Update address with IRS / USPS',w:'P'}
  ]},
  { id:'sghouse', label:'SG house', tasks:[
    {t:'Arrange painting',w:'P'},
    {t:'Arrange deep cleaning',w:'P'},
    {t:'Set up internet',w:'P'},
    {t:'Set up gas account',w:'P'},
    {t:'Set up water account',w:'P'},
    {t:'Set up electricity (SP Group)',w:'P'},
    {t:'Apply move-in form (condo management)',w:'P'},
    {t:'Fix any repairs before moving in',w:'P'}
  ]},
  { id:'visa', label:'Visa & immigration', tasks:[
    {t:'Praveen LTVP application',w:'P'},
    {t:'Pia student pass application',w:'P'},
    {t:'Renew Gudi PR',w:'G'},
    {t:'Check re-entry permit validity',w:'P'},
    {t:'Confirm employment pass status',w:'P'}
  ]},
  { id:'health', label:'Healthcare', tasks:[
    {t:'Health check for Gudi',w:'G'},
    {t:'Transfer medical records from US doctor',w:'both'},
    {t:'Transfer dental records',w:'both'},
    {t:'Find GP / family doctor in Singapore',w:'both'},
    {t:'Find dentist in Singapore',w:'both'},
    {t:'Stock up on US prescriptions before leaving',w:'both'}
  ]},
  { id:'trips', label:'Trips', tasks:[
    {t:'Orlando — confirm dates',w:'both'},
    {t:'Tahoe / Yellowstone — confirm dates',w:'both'},
    {t:'Book flights for trips',w:'P'},
    {t:'Book hotels / accommodation',w:'P'},
    {t:'One last Bay Area outing',w:'both'},
    {t:'Book one-way flights to Singapore',w:'P'}
  ]}
];

let state = {};
let activeTab = 'dogs';

function loadState() {
  try {
    const r = localStorage.getItem(STORAGE_KEY);
    if (r) state = JSON.parse(r);
  } catch(e) {}
  VERTICALS.forEach(v => {
    if (!state[v.id]) {
      state[v.id] = v.tasks.map((t, i) => ({ id: i, text: t.t, who: t.w, done: false }));
    }
  });
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = VERTICALS.map(v => {
    const tasks = state[v.id] || [];
    const done = tasks.filter(t => t.done).length;
    return `<button class="tab${v.id === activeTab ? ' active' : ''}" onclick="switchTab('${v.id}')">${v.label}<span class="tab-count">${done}/${tasks.length}</span></button>`;
  }).join('');
}

function renderGlobal() {
  let total = 0, done = 0;
  VERTICALS.forEach(v => {
    const t = state[v.id] || [];
    total += t.length;
    done += t.filter(x => x.done).length;
  });
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('global-bar').style.width = pct + '%';
  document.getElementById('global-pct').textContent = done + '/' + total + ' done';
}

function renderContent() {
  const v = VERTICALS.find(x => x.id === activeTab);
  const tasks = state[v.id] || [];
  const done = tasks.filter(t => t.done).length;
  const pct = tasks.length ? Math.round(done / tasks.length * 100) : 0;

  document.getElementById('content').innerHTML = `
    <div class="section-title">${v.label}</div>
    <div class="stats-row">
      <div class="stat"><div class="stat-label">Done</div><div class="stat-val">${done}<span>/${tasks.length}</span></div></div>
      <div class="stat"><div class="stat-label">Progress</div><div class="stat-val">${pct}<span>%</span></div></div>
      <div class="stat"><div class="stat-label">Remaining</div><div class="stat-val">${tasks.length - done}</div></div>
    </div>
    <div class="add-row">
      <input class="add-input" id="new-task" placeholder="Add a task..." onkeydown="if(event.key==='Enter') addTask()" />
      <select class="who-select" id="new-who">
        <option value="P">Praveen</option>
        <option value="G">Gudi</option>
        <option value="both">Both</option>
      </select>
      <button class="add-btn" onclick="addTask()">+ Add</button>
    </div>
    <div class="tasks">
      ${tasks.length === 0
        ? '<div class="empty">No tasks yet — add one above</div>'
        : tasks.map(t => `
          <div class="task${t.done ? ' done' : ''}">
            <input type="checkbox" class="cb" ${t.done ? 'checked' : ''} onchange="toggleTask('${v.id}', ${t.id})" />
            <span class="task-text">${escHtml(t.text)}</span>
            <span class="who-badge who-${t.who}">${t.who === 'both' ? 'Both' : t.who === 'P' ? 'Praveen' : 'Gudi'}</span>
            <button class="del-btn" onclick="deleteTask('${v.id}', ${t.id})" title="Remove">×</button>
          </div>`).join('')}
    </div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function switchTab(id) {
  activeTab = id;
  renderTabs();
  renderContent();
}

function toggleTask(vid, tid) {
  const t = state[vid].find(x => x.id === tid);
  if (t) t.done = !t.done;
  saveState();
  renderTabs();
  renderGlobal();
  renderContent();
}

function deleteTask(vid, tid) {
  state[vid] = state[vid].filter(x => x.id !== tid);
  saveState();
  renderTabs();
  renderGlobal();
  renderContent();
}

function addTask() {
  const inp = document.getElementById('new-task');
  const who = document.getElementById('new-who').value;
  const text = inp.value.trim();
  if (!text) return;
  const tasks = state[activeTab];
  const newId = tasks.length ? Math.max(...tasks.map(t => t.id)) + 1 : 0;
  tasks.push({ id: newId, text, who, done: false });
  inp.value = '';
  saveState();
  renderTabs();
  renderGlobal();
  renderContent();
  document.getElementById('new-task').focus();
}

loadState();
renderTabs();
renderGlobal();
renderContent();
</script>
</body>
</html>
